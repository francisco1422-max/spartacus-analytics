<!DOCTYPE html>
<html>
<head>
    <title>Spartacus Analytics</title>
    <style>
        body { background: #07090c; color: white; font-family: sans-serif; text-align: center; }
        .hero { padding: 60px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('/static/fundo.jpg'); background-size: cover; }
        .btn { padding: 15px 30px; background: #00ff88; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #log { background: #000; border: 1px solid #00ff88; width: 80%; margin: 20px auto; height: 200px; overflow-y: auto; padding: 15px; color: #00ff88; text-align: left; }
    </style>
</head>
<body>
    <div class="hero">
        <img src="/static/logo.png" width="120">
        <h1>SPARTACUS TECHNOLOGY</h1>
        <button class="btn" onclick="iniciar()">EXECUTAR IA AGORA</button>
    </div>
    <div id="log">Aguardando comando...</div>
    <script>
        function iniciar() {
            fetch('/iniciar', {method: 'POST'});
            setInterval(() => {
                fetch('/logs').then(r => r.json()).then(d => {
                    document.getElementById('log').innerHTML = d.logs.join('<br>');
                });
            }, 1000);
        }
    </script>
</body>
</html>
